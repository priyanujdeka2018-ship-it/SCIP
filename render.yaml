services:
  - type: web
    name: sobha-collections-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set manually in Render dashboard — never in this file
      - key: FRONTEND_URL
        sync: false          # Set to your Netlify URL in Render dashboard
    autoDeploy: true
    plan: free
