services:
  - type: web
    name: sobha-collections-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash Backend/start.sh
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
    autoDeploy: true
    plan: free
