services:
  - type: web
    name: sobha-collections-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=/opt/render/project/src/Backend uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir /opt/render/project/src/Backend
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
    autoDeploy: true
    plan: free
